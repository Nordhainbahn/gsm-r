<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body {
            background-color: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }

        .gsmr-wrapper {
            position: relative;
            display: inline-block;
        }

        #gsmr-img {
            display: block;
            height: 600px;
            width: auto;
        }

        /* Das Display-Fenster */
        #display {
            position: absolute;
            top: 25%;
            left: 20%;
            width: 61%;
            height: 46%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: #222;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .btn {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            border: none;
        }

        /* NEU: Der Einschaltknopf (Weißer Punkt oben links) */
        #btn-power-main {
            top: 5%;
            left: 15%;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
        }

        /* Notruf-Taste (Werte aus Screenshot) */
        #btn-sos {
            top: 1%;
            left: 0.5%;
            width: 7.5%;
            height: 16%;
            background: transparent;
        }

        /* E-Taste (Eingabe - Werte aus Screenshot) */
        #btn-enter {
            top: 58.5%;
            left: 92.3%;
            width: 5.8%;
            height: 11.5%;
            background: transparent;
        }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    <div id="display"></div>

    <button id="btn-power-main" class="btn" title="System einschalten" onclick="togglePower()"></button>

    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
    <button id="btn-enter" class="btn" onclick="pressEnter()"></button>
</div>

<script>
    let powerOn = false;
    let booting = false;
    const img = document.getElementById('gsmr-img');
    const display = document.getElementById('display');

    function togglePower() {
        if (booting) return;

        if (!powerOn) {
            booting = true;
            // Wechsel zu Ausgang.png
            img.src = 'Ausgang.png';
            display.innerHTML = "STARTING...";
            
            setTimeout(() => {
                display.innerHTML = "GSM-R BEREIT";
                powerOn = true;
                booting = false;
            }, 2000);
        } else {
            powerOn = false;
            display.innerHTML = "";
            img.src = 'off.png';
        }
    }

    function triggerEmergency() {
        if (!powerOn) return;
        display.style.color = "red";
        display.innerHTML = "NOTRUF AKTIV";
    }

    function pressEnter() {
        if (!powerOn) return;
        // Die E-Taste dient jetzt nur der Bestätigung
        console.log("Eingabe bestätigt");
        if(display.innerHTML === "GSM-R BEREIT") {
            display.innerHTML = "ZUGNUMMER?";
        }
    }
</script>

</body>
</html>
