<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body { background-color: #0c0c0c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        .gsmr-wrapper { position: relative; display: inline-block; }
        #gsmr-img { display: block; height: 600px; width: auto; user-select: none; }

        #display {
            position: absolute; top: 25%; left: 20.5%; width: 60.5%; height: 45.5%;
            background-color: #c0c0c0;
            display: flex; flex-direction: column; pointer-events: none; z-index: 10;
            border: 2px solid #000;
        }

        /* Das Feld oben in der Mitte */
        #top-info-box {
            position: absolute; 
            top: 0; 
            left: 25%; /* Mittig platziert */
            width: 50%; 
            height: 15%;
            display: none; 
            justify-content: center; 
            align-items: center;
            font-weight: bold; 
            font-size: 1.2rem; 
            color: #222;
            border-bottom: 1px solid #222;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        /* Nur dieses Feld wird schwarz bei ZD */
        #top-info-box.zd-active {
            background-color: #222;
            color: #c0c0c0;
        }

        #right-info-block {
            position: absolute; top: 0%; right: -12%; width: 100%; text-align: right;
            font-weight: bold; font-size: 2rem; color: #222; display: none;
        }

        /* Hartes Blinken */
        .blink { animation: step-blinker 1s steps(1) infinite; }
        @keyframes step-blinker { 50% { visibility: hidden; } }

        #softkeys {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 20%;
            display: none; grid-template-columns: repeat(10, 1fr);
            border-top: 2px solid #222;
        }
        .softkey { border-right: 1px solid #222; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; color: #222; }

        #main-content { margin-top: 20%; width: 100%; text-align: center; font-weight: bold; font-size: 1.5rem; color: #222; }

        .btn { position: absolute; cursor: pointer; z-index: 30; border: none; background: transparent; }
        #btn-power { top: 7.5%; left: 14.8%; width: 18px; height: 18px; background: white; border-radius: 50%; }
        #btn-sos { top: 1%; left: 0.5%; width: 7.5%; height: 16%; }
        
        .num-btn { top: 78%; width: 4.5%; height: 7.5%; }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    
    <div id="display">
        <div id="top-info-box">GSM-R-D</div>
        
        <div id="right-info-block" class="blink">
            <div>FC01 (Tf1)</div>
            <div>DB Regio</div>
        </div>

        <div id="sos-container">
            <div id="sos-text">Zum Sprechen:<br>Sprechtaste!</div>
            <img id="sos-pic" src="image_d97dfd.png" alt="SOS">
        </div>

        <div id="main-content"></div>

        <div id="softkeys">
            <div class="softkey" style="border-left: 1px solid #222;">ZN</div>
            <div class="softkey">FzSt</div>
            <div class="softkey">EVU</div>
            <div class="softkey"></div><div class="softkey"></div>
            <div class="softkey"></div><div class="softkey"></div>
            <div class="softkey"></div>
            <div class="softkey">Abgl.</div>
            <div class="softkey"></div>
        </div>
    </div>

    <button id="btn-power" class="btn" onclick="togglePower()"></button>
    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>

    <button class="btn num-btn" style="left: 35.8%;" onclick="typeNum('1')"></button>
    <button class="btn num-btn" style="left: 40.5%;" onclick="typeNum('2')"></button>
    <button class="btn num-btn" style="left: 45.2%;" onclick="typeNum('3')"></button>
    <button class="btn num-btn" style="left: 49.9%;" onclick="typeNum('4')"></button>
    <button class="btn num-btn" style="left: 54.6%;" onclick="typeNum('5')"></button>
    <button class="btn num-btn" style="left: 59.3%;" onclick="typeNum('6')"></button>
    <button class="btn num-btn" style="left: 64.1%;" onclick="typeNum('7')"></button>
    <button class="btn num-btn" style="left: 68.8%;" onclick="typeNum('8')"></button>
    <button class="btn num-btn" style="left: 73.5%;" onclick="openZD()"></button> <button class="btn num-btn" style="left: 78.2%;" onclick="typeNum('0')"></button>
</div>

<script>
    let powerOn = false;
    
    const topBox = document.getElementById('top-info-box');
    const rightInfo = document.getElementById('right-info-block');
    const softkeys = document.getElementById('softkeys');
    const mainContent = document.getElementById('main-content');

    function togglePower() {
        if (!powerOn) {
            document.getElementById('gsmr-img').src = 'Ausgang.png';
            setTimeout(() => {
                powerOn = true;
                topBox.style.display = "flex";
                rightInfo.style.display = "block";
                softkeys.style.display = "grid";
                mainContent.innerHTML = "GSM-R BEREIT";
            }, 1000);
        } else {
            location.reload();
        }
    }

    function openZD() {
        if (!powerOn) return;
        // Nur das obere Feld invertieren
        topBox.classList.add('zd-active');
        topBox.innerHTML = "Zugdaten";
        mainContent.innerHTML = "Zugnummer eingeben:";
    }

    function typeNum(n) {
        if(powerOn) mainContent.innerHTML += n;
    }

    function triggerEmergency() {
        if (!powerOn) return;
        // Notruf-Logik bleibt bestehen
        mainContent.innerHTML = "NOTRUF AKTIV";
    }
</script>
</body>
</html>
