<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Dieser Container sorgt dafür, dass Buttons und Bild zusammenbleiben */
        .gsmr-box {
            position: relative;
            width: 800px; /* Wir legen eine feste Breite fest */
            height: auto;
        }

        #gsmr-img {
            width: 100%; /* Das Bild füllt die 800px aus */
            display: block;
        }

        /* Das Display-Textfeld */
        #display-overlay {
            position: absolute;
            top: 19%;
            left: 21%;
            width: 66%;
            height: 51%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #222;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        /* Die Tasten */
        .btn {
            position: absolute;
            background: rgba(255, 0, 0, 0.3); /* Test-Modus: ROT sichtbar */
            border: 1px solid yellow;
            cursor: pointer;
            z-index: 20;
        }

        /* E-Taste (Power) ganz rechts unten in der vertikalen Reihe */
        #btn-e {
            top: 57%;
            left: 90.5%;
            width: 5.5%;
            height: 11%;
        }

        /* Notruf (Rote Taste oben links) */
        #btn-sos {
            top: 3.5%;
            left: 2%;
            width: 7.5%;
            height: 14%;
        }
    </style>
</head>
<body>

<div class="gsmr-box">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    <div id="display-overlay"></div>

    <button id="btn-e" class="btn" onclick="togglePower()"></button>
    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
</div>

<script>
    let powerOn = false;
    let booting = false;
    const img = document.getElementById('gsmr-img');
    const display = document.getElementById('display-overlay');

    function togglePower() {
        if (booting) return;
        if (!powerOn) {
            booting = true;
            img.src = 'Ausgang.png';
            display.innerHTML = "STARTING...";
            setTimeout(() => {
                display.innerHTML = "GSM-R BEREIT";
                powerOn = true;
                booting = false;
            }, 2000);
        } else {
            powerOn = false;
            display.innerHTML = "";
            img.src = 'off.png';
        }
    }

    function triggerEmergency() {
        if (powerOn) {
            display.style.color = "red";
            display.innerHTML = "NOTRUF AKTIV";
        }
    }
</script>
</body>
</html>
