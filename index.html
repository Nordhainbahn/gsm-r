<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body {
            background-color: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }

        .gsmr-wrapper {
            position: relative;
            display: inline-block;
        }

        #gsmr-img {
            display: block;
            height: 600px;
            width: auto;
        }

        /* Das Haupt-Display */
        #display {
            position: absolute;
            top: 25%;
            left: 20%;
            width: 61%;
            height: 46%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        /* Der Text-Layer für normales Booten/Bereit */
        #text-layer {
            font-weight: bold;
            font-size: 1.5rem;
            color: #222;
            text-align: center;
        }

        /* Spezieller Container für den Notruf-Inhalt */
        #sos-container {
            display: none; /* Standardmäßig aus */
            width: 90%;
            height: 80%;
            justify-content: space-between; /* Text links, Bild rechts */
            align-items: center;
            color: #222;
            padding: 0 10px;
        }

        #sos-text {
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 1.3;
            text-align: left;
        }

        #sos-pic {
            width: 140px; /* Größe des Piktogramms */
            height: auto;
            margin-right: 10px; /* Abstand zum rechten Rand */
        }

        .btn {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            border: none;
            background: transparent;
        }

        /* Power-Knopf oben links */
        #btn-power-main {
            top: 5%;
            left: 15%;
            width: 22px;
            height: 22px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 12px white;
        }

        /* SOS-Taste */
        #btn-sos {
            top: 1%; left: 0.5%; width: 7.5%; height: 16%;
        }

        /* E-Taste */
        #btn-enter {
            top: 58.5%; left: 92.3%; width: 5.8%; height: 11.5%;
        }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    
    <div id="display">
        <div id="text-layer"></div>

        <div id="sos-container">
            <div id="sos-text">Zum Sprechen:<br>Sprechtaste!</div>
            <img id="sos-pic" src="NothP.png" alt="SOS">
        </div>
    </div>

    <button id="btn-power-main" class="btn" onclick="togglePower()"></button>
    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
    <button id="btn-enter" class="btn" onclick="pressEnter()"></button>
</div>

<audio id="sos-audio" src="Nothaltauftrag.mp3"></audio>

<script>
    let powerOn = false;
    let booting = false;
    
    const img = document.getElementById('gsmr-img');
    const textLayer = document.getElementById('text-layer');
    const sosContainer = document.getElementById('sos-container');
    const sosAudio = document.getElementById('sos-audio');

    function togglePower() {
        if (booting) return;

        if (!powerOn) {
            booting = true;
            img.src = 'Ausgang.png';
            
            // Alles auf Null setzen beim Booten
            sosContainer.style.display = "none";
            textLayer.style.display = "block";
            textLayer.style.color = "#222"; 
            textLayer.innerHTML = "SYSTEM STARTING...";
            
            setTimeout(() => {
                textLayer.innerHTML = "GSM-R BEREIT";
                powerOn = true;
                booting = false;
            }, 2000);
        } else {
            powerOff();
        }
    }

    function powerOff() {
        powerOn = false;
        textLayer.innerHTML = "";
        sosContainer.style.display = "none";
        img.src = 'off.png';
        sosAudio.pause();
        sosAudio.currentTime = 0;
    }

    function triggerEmergency() {
        if (!powerOn) return;
        
        // Ton abspielen
        sosAudio.play().catch(e => console.log("Audio-Fehler"));
        
        // UI umschalten
        textLayer.style.display = "none";
        sosContainer.style.display = "flex";
    }

    function pressEnter() {
        if (!powerOn) return;
        console.log("Enter gedrückt");
    }
</script>

</body>
</html>
