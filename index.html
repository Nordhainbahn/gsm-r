<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Führerpult Simulation</title>
    <style>
        body {
            background-color: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .gsmr-wrapper {
            position: relative;
            display: inline-block;
        }

        #gsmr-img {
            display: block;
            height: 600px; /* Skaliere das Bild nach Bedarf */
            width: auto;
        }

        /* Das Display-Fenster */
        #display {
            position: absolute;
            top: 31%;   /* Angepasst an dein Bild */
            left: 61.5%;
            width: 36.5%;
            height: 33%;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #222;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        /* Button Styling zum Testen (Opacity auf 0 setzen, wenn fertig) */
        .btn {
            position: absolute;
            background: rgba(255, 255, 255, 0); 
            border: none;
            cursor: pointer;
            z-index: 20;
        }

        /* E-Taste (Anschalten) */
        #btn-e {
            top: 56.5%;
            left: 45.4%;
            width: 3.5%;
            height: 6.5%;
        }

        /* Notruf-Taste (Rot) */
        #btn-sos {
            top: 22.5%;
            left: 50.8%;
            width: 3.8%;
            height: 8.5%;
        }

        /* Hilfsklasse für Boot-Animation */
        .booting {
            color: #000;
        }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    <div id="display"></div>

    <button id="btn-e" class="btn" onclick="togglePower()"></button>
    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
</div>

<script>
    let powerOn = false;
    let inBootProcess = false;

    const img = document.getElementById('gsmr-img');
    const display = document.getElementById('display');

    function togglePower() {
        if (inBootProcess) return;

        if (!powerOn) {
            bootDevice();
        } else {
            powerOff();
        }
    }

    function bootDevice() {
        inBootProcess = true;
        img.src = 'Ausgang.png'; // Wechselt zum hellen Display
        
        display.innerHTML = "SYSTEM STARTING...";
        
        setTimeout(() => {
            display.innerHTML = "MESA 23 v4.2<br>SELF TEST OK";
            
            setTimeout(() => {
                display.innerHTML = "NETZ: DB NETZ<br>SUCHE ZUGDATEN...";
                
                setTimeout(() => {
                    display.innerHTML = "BEREIT<br>KEINE ZD";
                    powerOn = true;
                    inBootProcess = false;
                }, 2000);
            }, 1500);
        }, 1500);
    }

    function powerOff() {
        powerOn = false;
        display.innerHTML = "";
        img.src = 'off.png';
    }

    function triggerEmergency() {
        if (!powerOn) return;
        
        display.style.color = "red";
        display.innerHTML = "<strong>NOTRUF<br>AUSGELÖST</strong>";
        
        // Simuliert das Senden des Notrufs
        setTimeout(() => {
            if(powerOn) display.innerHTML = "NOTRUF AKTIV<br>SR: 112.5";
        }, 2000);
    }
</script>

</body>
</html>
