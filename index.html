<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body {
            background-color: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: white;
            font-family: Arial, sans-serif;
        }

        .gsmr-wrapper {
            position: relative;
            display: inline-block;
        }

        #gsmr-img {
            display: block;
            height: 600px; /* Skalierung für den Browser */
            width: auto;
            user-select: none;
        }

        /* Das Display-Fenster mit Arial Bold */
        #display {
            position: absolute;
            top: 31%;
            left: 20%;
            width: 60%;
            height: 38%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-weight: bold; /* Arial Bold */
            font-size: 1.4rem;
            color: #222;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        /* Deine exakten Button-Positionen */
        .btn {
            position: absolute;
            background: transparent; /* Hier auf transparent gesetzt für den Echtbetrieb */
            border: none;
            cursor: pointer;
            z-index: 20;
        }

        /* Notruf-Taste (Deine Werte) */
        #btn-sos {
            top: 1%;
            left: 0.5%;
            width: 7.5%;
            height: 16%;
        }

        /* E-Taste (Deine Werte) */
        #btn-e {
            top: 58.5%;
            left: 92.3%;
            width: 5.8%;
            height: 11.5%;
        }

        /* Platzhalter für die Zifferntasten (müssen noch feinjustiert werden) */
        .num-btn {
            bottom: 5%;
            width: 4%;
            height: 8%;
            background: rgba(255, 255, 255, 0.0); /* Zum Testen auf 0.2 setzen */
        }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    <div id="display"></div>

    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
    <button id="btn-e" class="btn" onclick="togglePower()"></button>

    <button class="btn num-btn" style="left: 30%;" onclick="pressKey(1)"></button>
</div>

<script>
    let powerOn = false;
    let inBootProcess = false;
    let currentInput = "";

    const img = document.getElementById('gsmr-img');
    const display = document.getElementById('display');

    // Ein- und Ausschalten über die E-Taste
    function togglePower() {
        if (inBootProcess) return;

        if (!powerOn) {
            bootSystem();
        } else {
            shutDown();
        }
    }

    function bootSystem() {
        inBootProcess = true;
        img.src = 'Ausgang.png'; // Wechselt zum An-Zustand
        display.style.color = "#333";
        display.innerHTML = "SYSTEM STARTING...";

        setTimeout(() => {
            display.innerHTML = "MESA 23 v4.2<br>SELF TEST OK";
            
            setTimeout(() => {
                display.innerHTML = "BEREIT<br>DB NETZ";
                powerOn = true;
                inBootProcess = false;
            }, 1500);
        }, 1500);
    }

    function shutDown() {
        powerOn = false;
        display.innerHTML = "";
        img.src = 'off.png'; // Zurück zum Aus-Zustand
    }

    function triggerEmergency() {
        if (!powerOn) return;
        display.style.color = "red";
        display.innerHTML = "NOTRUF AKTIV";
    }

    function pressKey(num) {
        if (!powerOn) return;
        currentInput += num;
        display.innerHTML = "ZUG: " + currentInput;
    }
</script>

</body>
</html>
