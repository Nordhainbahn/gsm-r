<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }

        .gsmr-box {
            position: relative;
            width: 900px; /* Breite leicht erhöht für bessere Sichtbarkeit */
            height: auto;
        }

        #gsmr-img {
            width: 100%;
            display: block;
            border-radius: 4px;
        }

        /* Das Display-Textfeld in Arial Bold */
        #display-overlay {
            position: absolute;
            top: 36%;
            left: 30.5%;
            width: 40.5%;
            height: 25%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Arial Black", Arial, sans-serif; /* Arial Bold / Black */
            font-weight: 900;
            font-size: 1.4rem;
            color: #333;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 1px;
        }

        /* Tasten-Styling */
        .btn {
            position: absolute;
            background: rgba(255, 255, 0, 0.2); /* Gelber Schimmer zur Kontrolle */
            border: 1px solid rgba(255, 255, 0, 0.5);
            cursor: pointer;
            z-index: 20;
        }

        /* Notruf (Rot oben links) */
        #btn-sos {
            top: 29%;
            left: 21.5%;
            width: 4.5%;
            height: 7%;
        }

        /* E-Taste (Rechts neben dem Display) */
        #btn-e {
            top: 55.5%;
            left: 74.3%; /* Korrigiert nach deinem Screenshot */
            width: 3.8%;
            height: 6.5%;
        }
    </style>
</head>
<body>

<div class="gsmr-box">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    <div id="display-overlay"></div>

    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
    <button id="btn-e" class="btn" onclick="togglePower()"></button>
</div>

<script>
    let powerOn = false;
    let booting = false;
    const img = document.getElementById('gsmr-img');
    const display = document.getElementById('display-overlay');

    function togglePower() {
        if (booting) return;

        if (!powerOn) {
            booting = true;
            img.src = 'Ausgang.png';
            display.style.color = "#333"; 
            display.innerHTML = "STARTING...";
            
            setTimeout(() => {
                display.innerHTML = "GSM-R BEREIT";
                powerOn = true;
                booting = false;
            }, 2000);
        } else {
            powerOn = false;
            display.innerHTML = "";
            img.src = 'off.png';
        }
    }

    function triggerEmergency() {
        if (!powerOn) return;
        
        display.style.color = "red";
        display.innerHTML = "NOTRUF AKTIV";
    }
</script>
</body>
</html>
