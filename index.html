<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body { background-color: #0c0c0c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        .gsmr-wrapper { position: relative; display: inline-block; }
        #gsmr-img { display: block; height: 600px; width: auto; user-select: none; }

        #display {
            position: absolute; top: 25%; left: 20.5%; width: 60.5%; height: 45.5%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: none; z-index: 10;
        }

        /* Top-Bar Werte */
        #top-info {
            position: absolute; top: -15%; left: 8%; width: 100%; text-align: center;
            font-weight: bold; font-size: 2rem; color: #222; display: none; z-index: 15;
        }

        /* Deine Idealwerte für die Seitenleiste */
        #right-info-block {
            position: absolute; 
            top: 0%; 
            right: -12%; 
            width: 100%; 
            text-align: right;
            font-weight: bold; 
            font-size: 2rem; 
            color: #222; 
            display: none;
        }

        /* Hartes Blinken ohne Animation-Easing */
        .blink { animation: step-blinker 1s steps(1) infinite; }
        @keyframes step-blinker { 50% { visibility: hidden; } }

        #text-layer { font-weight: bold; font-size: 1.5rem; color: #222; text-align: center; }

        #sos-container { display: none; position: absolute; width: 100%; height: 100%; }
        #sos-text { position: absolute; top: 50%; left: 10%; font-weight: bold; font-size: 1.3rem; color: #222; }
        #sos-pic { position: absolute; top: 1%; right: 18%; width: 185px; height: auto; }

        .btn { position: absolute; cursor: pointer; z-index: 20; border: none; background: transparent; }
        #btn-power-main { top: 7.5%; left: 14.8%; width: 18px; height: 18px; background-color: white; border-radius: 50%; box-shadow: 0 0 10px white; }
        #btn-sos { top: 1%; left: 0.5%; width: 7.5%; height: 16%; }
        #btn-enter { top: 58.5%; left: 92.3%; width: 5.8%; height: 11.5%; }

        .num-btn { top: 78%; width: 4.5%; height: 7.5%; }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    
    <div id="display">
        <div id="top-info">GSM-R-D</div>
        
        <div id="right-info-block" class="blink">
            <div>FC01 (Tf1)</div>
            <div>DB Regio</div>
        </div>

        <div id="text-layer"></div>
        <div id="sos-container">
            <div id="sos-text">Zum Sprechen:<br>Sprechtaste!</div>
            <img id="sos-pic" src="NothP.png" alt="SOS">
        </div>
    </div>

    <button id="btn-power-main" class="btn" onclick="togglePower()"></button>
    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
    <button id="btn-enter" class="btn" onclick="pressEnter()"></button>

    <button class="btn num-btn" style="left: 35.8%;" onclick="typeNum('1')"></button>
    <button class="btn num-btn" style="left: 40.5%;" onclick="typeNum('2')"></button>
    <button class="btn num-btn" style="left: 45.2%;" onclick="typeNum('3')"></button>
    <button class="btn num-btn" style="left: 49.9%;" onclick="typeNum('4')"></button>
    <button class="btn num-btn" style="left: 54.6%;" onclick="typeNum('5')"></button>
    <button class="btn num-btn" style="left: 59.3%;" onclick="typeNum('6')"></button>
    <button class="btn num-btn" style="left: 64.1%;" onclick="typeNum('7')"></button>
    <button class="btn num-btn" style="left: 68.8%;" onclick="typeNum('8')"></button>
    <button class="btn num-btn" style="left: 73.5%;" onclick="typeNum('9')"></button>
    <button class="btn num-btn" style="left: 78.2%;" onclick="typeNum('0')"></button>
</div>

<audio id="sos-audio" src="Nothaltauftrag.mp3"></audio>

<script>
    let powerOn = false;
    let booting = false;
    let zdRegistered = false;
    let currentInput = "";
    
    const textLayer = document.getElementById('text-layer');
    const topInfo = document.getElementById('top-info');
    const rightInfo = document.getElementById('right-info-block');
    const sosContainer = document.getElementById('sos-container');
    const sosAudio = document.getElementById('sos-audio');

    function togglePower() {
        if (booting) return;
        if (!powerOn) {
            booting = true;
            document.getElementById('gsmr-img').src = 'Ausgang.png';
            textLayer.innerHTML = "SYSTEM STARTING...";
            setTimeout(() => {
                textLayer.innerHTML = "";
                topInfo.style.display = "block";
                rightInfo.style.display = "block";
                powerOn = true;
                booting = false;
            }, 2000);
        } else {
            powerOff();
        }
    }

    function pressEnter() {
        if (!powerOn || zdRegistered) return;
        // Anmeldung stoppt das Blinken
        zdRegistered = true;
        rightInfo.classList.remove('blink');
        textLayer.innerHTML = "ZUG DATEN AKTIV";
    }

    function triggerEmergency() {
        if (!powerOn) return;
        sosAudio.play().catch(e => console.log("Audio Fehler"));
        textLayer.style.display = "none";
        sosContainer.style.display = "block";
    }

    function powerOff() {
        powerOn = false;
        zdRegistered = false;
        rightInfo.classList.add('blink');
        topInfo.style.display = rightInfo.style.display = sosContainer.style.display = "none";
        textLayer.style.display = "block";
        textLayer.innerHTML = "";
        document.getElementById('gsmr-img').src = 'off.png';
        sosAudio.pause();
        sosAudio.currentTime = 0;
    }

    function typeNum(n) { if(powerOn && !sosContainer.style.display === "block") { currentInput += n; textLayer.innerHTML = "Eingabe: " + currentInput; } }
</script>
</body>
</html>
