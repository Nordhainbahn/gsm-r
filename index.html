<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body {
            background-color: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .gsmr-wrapper {
            position: relative;
            display: inline-block;
        }

        #gsmr-img {
            display: block;
            height: 600px;
            width: auto;
            user-select: none;
        }

        /* Das Haupt-Display */
        #display {
            position: absolute;
            top: 25%;
            left: 20.5%;
            width: 60.5%;
            height: 45.5%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        /* Standard-Text (Bereit / Starting) */
        #text-layer {
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 1.5rem;
            color: #222;
            text-align: center;
        }

        /* Notruf-Container (Absolut positioniert für präzise Steuerung) */
        #sos-container {
            display: none; 
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* "Zum Sprechen Sprechtaste" - Links positioniert */
        #sos-text {
            position: absolute;
            top: 45%;
            left: 5%;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 1.3rem;
            line-height: 1.2;
            color: #222;
            text-align: left;
        }

        /* Piktogramm - Rechts und etwas höher */
        #sos-pic {
            position: absolute;
            top: 22%;
            right: 12%;
            width: 185px; /* Dein Wert aus dem Screenshot */
            height: auto;
        }

        /* Button-Styles */
        .btn {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            border: none;
            background: transparent; /* Für Echtbetrieb unsichtbar */
        }

        /* Weißer Einschaltknopf oben links */
        #btn-power-main {
            top: 7.5%;
            left: 14.8%;
            width: 18px;
            height: 18px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
        }

        /* SOS-Taste (Werte aus Screenshot) */
        #btn-sos {
            top: 1%;
            left: 0.5%;
            width: 7.5%;
            height: 16%;
        }

        /* E-Taste (Werte aus Screenshot) */
        #btn-enter {
            top: 58.5%;
            left: 92.3%;
            width: 5.8%;
            height: 11.5%;
        }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    
    <div id="display">
        <div id="text-layer"></div>

        <div id="sos-container">
            <div id="sos-text">Zum Sprechen:<br>Sprechtaste!</div>
            <img id="sos-pic" src="NothP.png" alt="SOS">
        </div>
    </div>

    <button id="btn-power-main" class="btn" title="Einschalten" onclick="togglePower()"></button>
    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
    <button id="btn-enter" class="btn" onclick="pressEnter()"></button>
</div>

<audio id="sos-audio" src="Nothaltauftrag.mp3"></audio>

<script>
    let powerOn = false;
    let booting = false;
    
    const img = document.getElementById('gsmr-img');
    const textLayer = document.getElementById('text-layer');
    const sosContainer = document.getElementById('sos-container');
    const sosAudio = document.getElementById('sos-audio');

    function togglePower() {
        if (booting) return;

        if (!powerOn) {
            booting = true;
            img.src = 'Ausgang.png'; //
            
            // Sicherstellen, dass alles auf Standard (Schwarz) steht
            sosContainer.style.display = "none";
            textLayer.style.display = "block";
            textLayer.style.color = "#222"; 
            textLayer.innerHTML = "SYSTEM STARTING...";
            
            setTimeout(() => {
                textLayer.innerHTML = "GSM-R BEREIT";
                powerOn = true;
                booting = false;
            }, 2000);
        } else {
            powerOff();
        }
    }

    function powerOff() {
        powerOn = false;
        textLayer.innerHTML = "";
        sosContainer.style.display = "none";
        img.src = 'off.png'; //
        
        // Sound stoppen
        sosAudio.pause();
        sosAudio.currentTime = 0;
    }

    function triggerEmergency() {
        if (!powerOn) return;
        
        // Sound abspielen
        sosAudio.play().catch(e => console.log("Audio-Fehler: Datei fehlt oder Browser-Sperre."));
        
        // UI umschalten: Normaler Text weg, SOS-Layout her
        textLayer.style.display = "none";
        sosContainer.style.display = "block";
    }

    function pressEnter() {
        if (!powerOn) return;
        console.log("Eingabe bestätigt (E-Taste)");
    }
</script>

</body>
</html>
