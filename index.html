<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body {
            background-color: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }

        .gsmr-wrapper {
            position: relative;
            display: inline-block;
        }

        #gsmr-img {
            display: block;
            height: 600px;
            width: auto;
        }

        /* Das Display-Fenster */
        #display {
            position: absolute;
            top: 25%;
            left: 20%;
            width: 61%;
            height: 46%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: #222; /* Standardfarbe Schwarz */
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        /* Platzhalter für das Piktogramm */
        #sos-pic {
            display: none;
            width: 120px; /* Breite des Piktogramms im Display */
            height: auto;
            margin-bottom: 10px;
        }

        .btn {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            border: none;
            background: transparent;
        }

        /* Weißer Einschaltknopf oben links */
        #btn-power-main {
            top: 5%;
            left: 15%;
            width: 22px;
            height: 22px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 12px white;
        }

        /* SOS-Taste */
        #btn-sos {
            top: 1%;
            left: 0.5%;
            width: 7.5%;
            height: 16%;
        }

        /* E-Taste (Eingabe) */
        #btn-enter {
            top: 58.5%;
            left: 92.3%;
            width: 5.8%;
            height: 11.5%;
        }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    
    <div id="display">
        <img id="sos-pic" src="notruf_piktogramm.png" alt="SOS Icon">
        <div id="text-layer"></div>
    </div>

    <button id="btn-power-main" class="btn" onclick="togglePower()"></button>
    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
    <button id="btn-enter" class="btn" onclick="pressEnter()"></button>
</div>

<audio id="sos-audio" src="Nothaltauftrag.mp3"></audio>

<script>
    let powerOn = false;
    let booting = false;
    
    const img = document.getElementById('gsmr-img');
    const display = document.getElementById('display');
    const textLayer = document.getElementById('text-layer');
    const sosPic = document.getElementById('sos-pic');
    const sosAudio = document.getElementById('sos-audio');

    function togglePower() {
        if (booting) return;

        if (!powerOn) {
            booting = true;
            img.src = 'Ausgang.png';
            
            // RESET: Schrift auf Schwarz und Piktogramm weg
            display.style.color = "#222"; 
            sosPic.style.display = "none";
            textLayer.innerHTML = "SYSTEM STARTING...";
            
            setTimeout(() => {
                textLayer.innerHTML = "GSM-R BEREIT";
                powerOn = true;
                booting = false;
            }, 2000);
        } else {
            powerOff();
        }
    }

    function powerOff() {
        powerOn = false;
        textLayer.innerHTML = "";
        sosPic.style.display = "none";
        img.src = 'off.png';
        
        // Ton stoppen beim Ausschalten
        sosAudio.pause();
        sosAudio.currentTime = 0;
    }

    function triggerEmergency() {
        if (!powerOn) return;
        
        // Ton abspielen
        sosAudio.play().catch(e => console.log("Audio-Fehler: Datei fehlt oder Browser blockt."));
        
        // Piktogramm einblenden
        sosPic.style.display = "block";
        textLayer.innerHTML = "NOTRUF AKTIV";
        
        // Schriftfarbe bleibt Schwarz
        display.style.color = "#222"; 
    }

    function pressEnter() {
        if (!powerOn) return;
        console.log("E-Taste gedrückt (Eingabe)");
    }
</script>

</body>
</html>
