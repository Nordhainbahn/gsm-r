<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GSM-R Simulation</title>
    <style>
        body {
            background-color: #0c0c0c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }

        .gsmr-wrapper {
            position: relative;
            display: inline-block;
        }

        #gsmr-img {
            display: block;
            height: 600px;
            width: auto;
        }

        #display {
            position: absolute;
            top: 25%;
            left: 20%;
            width: 61%;
            height: 46%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: #222; /* Standard: Schwarz/Dunkelgrau */
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        /* Platzhalter für das Notruf-Piktogramm */
        #emergency-icon {
            display: none;
            width: 80px;
            margin-bottom: 10px;
        }

        .btn {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            border: none;
        }

        #btn-power-main {
            top: 5%;
            left: 15%;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
        }

        #btn-sos {
            top: 1%; left: 0.5%; width: 7.5%; height: 16%;
            background: transparent;
        }

        #btn-enter {
            top: 58.5%; left: 92.3%; width: 5.8%; height: 11.5%;
            background: transparent;
        }
    </style>
</head>
<body>

<div class="gsmr-wrapper">
    <img id="gsmr-img" src="off.png" alt="GSM-R">
    <div id="display">
        <img id="emergency-icon" src="dein_piktogramm.png" alt="SOS">
        <div id="text-layer"></div>
    </div>

    <button id="btn-power-main" class="btn" onclick="togglePower()"></button>
    <button id="btn-sos" class="btn" onclick="triggerEmergency()"></button>
    <button id="btn-enter" class="btn" onclick="pressEnter()"></button>
</div>

<audio id="sos-sound" src="sos.mp3"></audio>

<script>
    let powerOn = false;
    let booting = false;
    const img = document.getElementById('gsmr-img');
    const display = document.getElementById('display');
    const textLayer = document.getElementById('text-layer');
    const sosIcon = document.getElementById('emergency-icon');
    const sosAudio = document.getElementById('sos-sound');

    function togglePower() {
        if (booting) return;

        if (!powerOn) {
            booting = true;
            img.src = 'Ausgang.png';
            
            // WICHTIG: Farbe explizit auf Schwarz zurücksetzen
            display.style.color = "#222"; 
            sosIcon.style.display = "none";
            textLayer.innerHTML = "SYSTEM STARTING...";
            
            setTimeout(() => {
                textLayer.innerHTML = "GSM-R BEREIT";
                powerOn = true;
                booting = false;
            }, 2000);
        } else {
            powerOff();
        }
    }

    function powerOff() {
        powerOn = false;
        textLayer.innerHTML = "";
        sosIcon.style.display = "none";
        img.src = 'off.png';
        if(sosAudio) { sosAudio.pause(); sosAudio.currentTime = 0; }
    }

    function triggerEmergency() {
        if (!powerOn) return;
        
        // Ton abspielen
        sosAudio.play().catch(e => console.log("Sound-Blockade durch Browser"));
        
        // Piktogramm anzeigen (sobald du die Datei hochgeladen hast)
        sosIcon.style.display = "block";
        
        // Schrift bleibt schwarz, wie gewünscht
        display.style.color = "#222"; 
        textLayer.innerHTML = "NOTRUF";
    }

    function pressEnter() {
        if (!powerOn) return;
        console.log("Eingabe");
    }
</script>

</body>
</html>
